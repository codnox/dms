services:
  - type: web
    name: dms-backend
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 4000
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: true
      - key: DB_SSL_VERIFY
        value: true
      - key: DB_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false